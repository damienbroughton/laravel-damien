# Docker Compose configuration using the modern Compose specification

networks:
  application:
    driver: bridge

services:

  # Laravel / PHP Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mybackend

    # Expose Laravel development server
    ports:
      - "8080:8000"

    # Mount backend source code into container
    volumes:
      - .:/app

    # Ensure database container starts first
    depends_on:
      db:
        condition: service_healthy

    environment:
      # Database connection settings used by Laravel
      - DB_CONNECTION=mysql
      - DB_HOST=mymysqldb
      - DB_PORT=3306
      - DB_DATABASE=test-db
      - DB_USERNAME=appuser
      - DB_PASSWORD=apppassword

    networks:
      - application

    # Run multiple startup commands
    command: >
      sh -c "
      composer install &&
      php artisan key:generate --force &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  # MySQL Database Container
  db:
    image: mysql:8.4   # Current LTS MySQL version
    container_name: mymysqldb

    ports:
      - "3306:3306"

    volumes:
      - ./data:/var/lib/mysql

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: test-db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword

    networks:
      - application

    # Healthcheck to ensure MySQL is ready before Laravel runs migrations
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppassword"]
      interval: 5s
      timeout: 5s
      retries: 10